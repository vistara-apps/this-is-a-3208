env:
  OWNER: ${{ secrets.REPO_OWNER }}
  REPO: ${{ secrets.REPO_NAME }}
steps:
  - name: Checkout code
    uses: actions/checkout@v2
  - name: Setup Node.js
    uses: actions/setup-node@v2
    with:
      node-version: '14'
  - name: Install dependencies
    run: npm install
  - name: Run tests
    run: npm test
